name: Selenium with Java and TestNG framework

on:
  push:
    branches: [main]
  
  pull-requests:
    branches: [main]

jobs:
  test:
    runs-on: ubentu-latest
    
    steps:
      -name: Checkout Code
       uses: actions/checkout@v4
      
      -name: Setup Java
       uses: actions/setup-java@v4
       with:
         version: '17'
         distribution: 'temurin'
         
      -name: Builde & Run Tests
       run: mvn clean test
       
      -name: Upload Test Reports
       if: always()
       uses: actions/upload-artifact@v4
       with:
         name: testng-reports
         path: target/surefire-reports/
      
      -